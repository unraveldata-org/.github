name: Jira ID Enforcer

on:
  workflow_call:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: [self-hosted, quick]
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Check Title
        shell: bash
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$TITLE" | grep -qE '[A-Z][A-Z0-9]+-[0-9]+'; then
            echo "✅ Success: Jira ID found."
            exit 0
          else
            echo "❌ Fail: Title must contain a Jira ID (e.g., SNOW-4300, U49-341)."
            exit 1
          fi
