name: Jira ID Enforcer

on:
  workflow_call:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: [self-hosted, quick]
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Check Title
        shell: bash
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "🔎 PR title raw: [$TITLE]"
          printf '🔎 PR title quoted: %q\n' "$TITLE"

          if [[ -z "$TITLE" ]]; then
            echo "::error title=Missing PR Title::PR title is empty."
            exit 1
          fi

          if [[ "$TITLE" =~ [A-Z][A-Z0-9]*-[0-9]+ ]]; then
            echo "✅ Success: Jira ID found."
            exit 0
          fi

          echo "::error title=Jira ID Missing::Title must contain a Jira ID like DT-6871."
          echo "❌ Fail: Jira ID not found in title."
          echo "Hint: Use format like: DT-6871: UI port UI changes to 4799"
          exit 1
