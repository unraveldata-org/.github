name: Jira ID Enforcer

on:
  workflow_call:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Check Title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Regex updated to mandate a DASH and Numbers after it
          if echo "$PR_TITLE" | grep -qiE '[a-z0-9]+-[0-9]+'; then
            echo "✅ Success: Valid Jira ID pattern found in the title."
            exit 0
          else
            echo "========================================================================"
            echo "❌ ERROR: INVALID PULL REQUEST TITLE"
            echo "========================================================================"
            echo "Problem: No valid Jira ID or Ticket pattern was found in your PR title."
            echo "Your Current Title: '$PR_TITLE'"
            echo ""
            echo "How to fix this:"
            echo "Please edit your PR title to include a valid ticket identifier."
            echo "The title must contain letters/numbers followed by a DASH (-), then numbers."
            echo ""
            echo "Valid Examples:"
            echo "  - DT-6871: UI port UI changes to 4799"
            echo "  - U49-341: STS creds integration"
            echo "  - SNOW-4300: Loading insights section"
            echo "========================================================================"
            exit 1
          fi
