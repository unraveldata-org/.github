name: Jira ID Enforcer

on:
  workflow_call:
    inputs: {}
    secrets: {}

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Validate Jira ID
        shell: bash
        run: |
          # Use raw variable to handle special characters safely
          TITLE=$(cat << 'EOF' | head -n 1
          ${{ github.event.pull_request.title }}
          EOF
          )
          
          echo "Testing Title: $TITLE"
          
          if [[ "$TITLE" =~ [A-Z]+-[0-9]+ ]]; then
            echo "✅ Jira ID found"
            exit 0
          else
            echo "❌ No Jira ID found in title: $TITLE"
            exit 1
          fi
