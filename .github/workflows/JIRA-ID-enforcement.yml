name: Jira ID Enforcer

on:
  workflow_call:
permissions:
  contents: read
  pull-requests: read

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Validate Jira ID
        shell: bash
        run: |
          # Title ko safely handle karne ke liye
          TITLE="${{ github.event.pull_request.title }}"
          
          echo "Validating PR Title: $TITLE"
          
          # Jira ID Regex (Letters-Numbers)
          if [[ "$TITLE" =~ [A-Z]+-[0-9]+ ]]; then
            echo "✅ Success: Jira ID found."
            exit 0
          else
            echo "❌ Error: PR title must contain a Jira ID (e.g., PROJ-123)."
            exit 1
          fi
