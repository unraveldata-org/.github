name: Jira ID Enforcer

on:
  workflow_call:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Check Title
        shell: bash
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ [A-Z]+-[0-9]+ ]]; then
            echo "✅ Pass: Jira ID found."
            exit 0
          else
            echo "❌ Fail: PR Title must have a Jira ID (e.g. PROJ-123)."
            exit 1
          fi
