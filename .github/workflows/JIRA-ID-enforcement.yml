name: Jira ID Enforcer

on:
  workflow_call:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  jira-validation:
    name: "Jira ID Validation"
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Check Title
        shell: bash
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qiE '[a-z0-9]+[- ]+[a-z0-9]+'; then
            exit 0
          else
            echo "❌ Fail: Title must contain a Jira ID (e.g., SNOW-4300, U49-341)."
            exit 1
          fi
